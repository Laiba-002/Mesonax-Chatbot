version: '3.8'

services:
  neo4j:
    image: neo4j:5.15.0
    container_name: corxai_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/import:/var/lib/neo4j/import
      - ./neo4j/plugins:/plugins
      - ./neo4j/conf:/conf
    environment:
      # Timezone
      - TZ=UTC
      - NEO4J_db_temporal_timezone=UTC
      
      # Authentication
      - NEO4J_AUTH=neo4j/CorxAi@2025
      
      # Memory Configuration (adjust based on your server)
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G
      
      # Network Configuration
      - NEO4J_server_default__listen__address=0.0.0.0
      - NEO4J_server_bolt_enabled=true
      - NEO4J_server_http_enabled=true
      
      # Security Settings
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*
      
      # Performance Tuning
      - NEO4J_server_bolt_thread__pool__min__size=5
      - NEO4J_server_bolt_thread__pool__max__size=400
      - NEO4J_dbms_transaction_timeout=60s
      
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p CorxAi@2025 'RETURN 1;' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - corxai_network
    

networks:
  corxai_network:
    driver: bridge

    